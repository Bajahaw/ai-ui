<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta
      name="description"
      content="Smoothest AI chat ever made."
    />
    <meta
      name="keywords"
      content="AI chat, chat interface, open source AI UI, Golang, React, OpenAI compatible, LLM UI, T3 chat open source"
    />
    <meta name="robots" content="index,follow" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#19191a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="AI UI" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AI UI" />
    <meta property="og:title" content="AI UI" />
    <meta
      property="og:description"
      content="Smoothest AI chat ever made."
    />
    <meta property="og:image" content="/image.png" />
    <meta property="og:image:alt" content="AI UI dashboard preview" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AI UI" />

      name="twitter:description"
      content="Smoothest AI chat ever made."
    />
    <meta name="twitter:image" content="/image.png" />
    <meta name="twitter:image:alt" content="AI UI dashboard preview" />
    <title>AI UI - Lightweight AI chat interface</title>
    <script>
      (function () {
        const stored = localStorage.getItem("ai-ui-theme");
        document.documentElement.className =
          stored === "light" || stored === "dark" ? stored : "dark";
      })();
    </script>
    <style>
      html:not(.light) {
        color-scheme: dark;
      }

      html:not(.light) body {
        background-color: hsl(240 0% 10%) !important;
        color: hsl(0 0% 98%) !important;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
