name: Docker Image CI

on:
  push:
    branches: [ "main" ]
    paths:
      - "Dockerfile"
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push final image (reuse unchanged frontend/backend layers)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/bajahaw/ai-ui:latest
            ghcr.io/bajahaw/ai-ui:sha-${{ github.sha }}
          provenance: false
          sbom: false
          cache-from: type=registry,ref=ghcr.io/bajahaw/ai-ui:latest
          build-args: |
            BUILDKIT_INLINE_CACHE=1
